<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MathMnemo · Dynamic view</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#0f172a;color:#e2e8f0;padding:16px}
#app{max-width:1300px;margin:0 auto}
h1{text-align:center;font-size:1.8rem;color:#fbbf24;margin-bottom:2px}
.sub{text-align:center;color:#94a3b8;margin-bottom:16px;font-size:0.85rem}
.cp{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px;padding:14px;background:#1e293b;border-radius:10px;border:1px solid #334155}
.cp label{font-size:0.78rem;color:#94a3b8;display:block;margin-bottom:3px}
.cp input,.cp select{padding:6px 10px;border:1px solid #334155;border-radius:6px;background:#0f172a;color:#e2e8f0;font-size:0.9rem;outline:none}
.cp input:focus,.cp select:focus{border-color:#fbbf24}
.cp input[type=number]{width:70px;text-align:center}
.cp input[type=range]{width:140px;accent-color:#fbbf24;border:none;padding:0;background:transparent}
.rv{color:#fbbf24;font-weight:700;min-width:24px;text-align:center}
.cp .ck{display:flex;align-items:center;gap:6px}
.cp .ck input{width:auto;accent-color:#fbbf24}
.cp .ck label{display:inline;margin:0}
.cp button{padding:6px 16px;border:none;border-radius:6px;background:#334155;color:#e2e8f0;cursor:pointer;font-size:0.85rem}
.cp button:hover{background:#475569}
.c2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:750px){.c2{grid-template-columns:1fr}}
.c3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:1000px){.c3{grid-template-columns:1fr 1fr}}
@media(max-width:750px){.c3{grid-template-columns:1fr}}
.gr{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.sc{background:#1e293b;border-radius:10px;padding:14px;border:1px solid #334155}
.sc h3{color:#fbbf24;margin-bottom:6px;text-align:center;font-size:0.95rem}
.sc .rw{display:flex;justify-content:space-between;padding:3px 8px;font-size:0.85rem;border-bottom:1px solid #1a1f2e}
.sc .rw:last-child{border-bottom:none}
.sc .hl{background:#1e3a2e;border-radius:4px}
.sh{font-size:1.1rem;color:#fbbf24;margin:18px 0 10px;padding-bottom:4px;border-bottom:1px solid #334155;display:flex;align-items:center;gap:10px}
.sh sp{font-size:0.8rem;color:#94a3b8;font-weight:400}
.cd{background:#1e293b;border-radius:8px;padding:10px;border:1px solid #334155;transition:border-color .2s}
.cd:hover{border-color:#fbbf24}
.cd h3{font-size:0.85rem;color:#fbbf24;text-align:center;margin-bottom:4px}
.cd .rw{display:flex;justify-content:space-between;padding:2px 6px;font-size:0.8rem;border-bottom:1px solid #1a1f2e}
.cd .rw:last-child{border-bottom:none}
.cd .op{color:#94a3b8}.cd .res{color:#f1f5f9;font-weight:600}
.btn{padding:8px 20px;border:none;border-radius:8px;background:#fbbf24;color:#0f172a;font-weight:700;font-size:0.9rem;cursor:pointer;display:block;width:fit-content;margin:0 auto 16px}
.btn:hover{background:#fcd34d}
</style>
</head>
<body>
<div id="app">
  <h1>MathMnemo · Dynamic view</h1>
  <p class="sub">Pick a number and see everything : multiplication, powers, roots</p>

  <div class="cp">
    <div><label>Number</label><input type="number" id="n" value="7" min="1" max="999"></div>
    <div><label>Multiply up to</label><input type="number" id="multTo" value="12" min="1" max="50"></div>
    <div><label>Max power</label><input type="number" id="powMax" value="10" min="1" max="25"></div>
    <div><label>Max root</label><input type="number" id="rootMax" value="10" min="2" max="25"></div>
    <div style="display:flex;align-items:center;gap:6px">
      <div><label>Show sections</label>
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <div class="ck"><input type="checkbox" id="showMult" checked><label>×</label></div>
          <div class="ck"><input type="checkbox" id="showPow" checked><label>n¹ n² n³</label></div>
          <div class="ck"><input type="checkbox" id="showRoot" checked><label>√</label></div>
          <div class="ck"><input type="checkbox" id="show2pow" checked><label>2ⁿ</label></div>
          <div class="ck"><input type="checkbox" id="showSq" checked><label>n²</label></div>
        </div>
      </div>
    </div>
    <button id="resetBtn">Reset all</button>
    <span class="st" id="info" style="font-size:0.82rem;color:#94a3b8;margin-left:auto"></span>
  </div>

  <button class="btn" id="printBtn"> Print</button>
  <div id="content"></div>
</div>

<script>
(function(){
  var s = {0:'⁰',1:'¹',2:'²',3:'³',4:'⁴',5:'⁵',6:'⁶',7:'⁷',8:'⁸',9:'⁹'};
  function S(n){return String(n).split('').map(function(c){return s[c]||c}).join('');}

  var nInput = document.getElementById('n');
  var multToInput = document.getElementById('multTo');
  var powMaxInput = document.getElementById('powMax');
  var rootMaxInput = document.getElementById('rootMax');
  var showMult = document.getElementById('showMult');
  var showPow = document.getElementById('showPow');
  var showRoot = document.getElementById('showRoot');
  var show2pow = document.getElementById('show2pow');
  var showSq = document.getElementById('showSq');

  function render(){
    var n = parseInt(nInput.value)||1;
    var multTo = parseInt(multToInput.value)||10;
    var powMax = Math.min(25, parseInt(powMaxInput.value)||10);
    var rootMax = Math.min(25, Math.max(2, parseInt(rootMaxInput.value)||10));
    var html = '';
    var info = [];

    if(showMult.checked){
      info.push('× up to '+multTo);
      html += '<div class="sh">× Multiplication table of <sp>'+n+' × 1 to '+n+' × '+multTo+'</sp></div><div class="sc">';
      for(var j=1;j<=multTo;j++) html += '<div class="rw"><span class="op">'+n+' × '+j+'</span><span class="res">'+(n*j)+'</span></div>';
      html += '</div>';
    }

    if(showSq.checked){
      info.push('squares 1-25');
      html += '<div class="sh"> Perfect squares <sp>n² from 1 to 25</sp></div><div class="gr">';
      for(var c=1;c<=25;c++) html += '<div class="cd"><h3>'+c+'²</h3><div class="rw"><span class="op">'+c+' × '+c+'</span><span class="res">'+(c*c)+'</span></div></div>';
      html += '</div>';
    }

    if(showPow.checked){
      info.push('n¹ to n'+S(powMax));
      html += '<div class="sh"> Powers <sp>'+n+S(' from k=1 to '+powMax)+'</sp></div><div class="sc">';
      for(var k=1;k<=powMax;k++){
        var v = Math.pow(n,k);
        if(v>9e14) html += '<div class="rw"><span class="op">'+n+S(k)+'</span><span class="res" style="font-size:0.75rem">≥10¹⁵</span></div>';
        else html += '<div class="rw"><span class="op">'+n+S(k)+'</span><span class="res">'+v.toLocaleString('en-US')+'</span></div>';
      }
      html += '</div>';
    }

    if(show2pow.checked){
      info.push('2ⁿ 1-25');
      html += '<div class="sh"> 2ⁿ <sp>n=1 to 25</sp></div><div class="sc"><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:4px">';
      for(var k2=1;k2<=25;k2++) html += '<div class="rw"><span class="op">2'+S(k2)+'</span><span class="res">'+(Math.pow(2,k2)).toLocaleString('en-US')+'</span></div>';
      html += '</div></div>';
    }

    if(showRoot.checked){
      info.push('√ up to '+rootMax);
      html += '<div class="sh"> Roots of <sp>'+n+S(' (2nd to '+rootMax+'th)')+'</sp></div><div class="sc">';
      for(var r=2;r<=rootMax;r++){
        var rv = Math.pow(n,1/r);
        var perf = Number.isInteger(rv) && Math.pow(Math.round(rv),r) === n;
        html += '<div class="rw'+(perf?' hl':'')+'"><span class="op">'+S(r)+'√'+n+'</span><span class="res">'+(perf?Math.round(rv):rv.toFixed(8).replace(/\.?0+$/,''))+'</span></div>';
      }
      html += '</div>';

      html += '<div class="sh"> Square roots <sp>√n from 1 to 25</sp></div><div class="gr">';
      for(var rc=1;rc<=25;rc++){
        var rv2 = Math.sqrt(rc);
        var perf2 = Number.isInteger(rv2);
        html += '<div class="cd"><h3>√'+rc+'</h3><div class="rw"><span class="op">Value</span><span class="res">'+(perf2?rv2:rv2.toFixed(6))+'</span></div>'+(perf2?'<div class="rw hl"><span class="op"> Perfect</span><span class="res">= '+rv2+'</span></div>':'')+'</div>';
      }
      html += '</div>';

      html += '<div class="sh"> Cube roots <sp>∛n from 1 to 25</sp></div><div class="gr">';
      for(var r3=1;r3<=25;r3++){
        var v3 = Math.cbrt(r3);
        var p3 = Number.isInteger(v3);
        html += '<div class="cd"><h3>∛'+r3+'</h3><div class="rw"><span class="op">Value</span><span class="res">'+(p3?v3:v3.toFixed(6))+'</span></div>'+(p3?'<div class="rw hl"><span class="op"> Perfect</span><span class="res">= '+v3+'</span></div>':'')+'</div>';
      }
      html += '</div>';
    }

    document.getElementById('content').innerHTML = html;
    document.getElementById('info').textContent = info.join(' · ');
  }

  function resetAll(){
    nInput.value = 7;
    multToInput.value = 12;
    powMaxInput.value = 10;
    rootMaxInput.value = 10;
    showMult.checked = true;
    showPow.checked = true;
    showRoot.checked = true;
    show2pow.checked = true;
    showSq.checked = true;
    render();
  }

  nInput.addEventListener('input', render);
  multToInput.addEventListener('input', render);
  powMaxInput.addEventListener('input', render);
  rootMaxInput.addEventListener('input', render);
  showMult.addEventListener('change', render);
  showPow.addEventListener('change', render);
  showRoot.addEventListener('change', render);
  show2pow.addEventListener('change', render);
  showSq.addEventListener('change', render);
  document.getElementById('resetBtn').addEventListener('click', resetAll);
  document.getElementById('printBtn').addEventListener('click', function(){window.print()});

  render();
})();
</script>
</body>
</html>
